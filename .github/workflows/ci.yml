name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint is intentionally excluded until Phase 3: apps/web needs an
      # ESLint 9 flat config wired to Next 16, and apps/mobile needs
      # .eslintrc.js with eslint-config-expo. Both arrive once real code
      # lands during project migrations.
      - name: Typecheck · Test
        run: pnpm turbo run typecheck test
